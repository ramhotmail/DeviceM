{% extends "base.html" %}
{% block title %}تسجيل الدخول{% endblock %}
{% block content %}
<div class="row justify-content-center align-items-center mt-4">
  <div class="col-md-6 col-lg-5 col-xl-4">
    <div class="card card-shadow border-0 rounded-4 overflow-hidden">
      <div class="bg-primary text-white text-center p-4" style="background: linear-gradient(135deg, #0d6efd 0%, #0043a8 100%) !important;">
        <i class="bi bi-shield-lock" style="font-size: 3rem;"></i>
        <h4 class="mt-2 fw-bold">تسجيل الدخول</h4>
        <p class="mb-0 text-white-50 small">أدخل بيانات الاعتماد للمتابعة</p>
      </div>
      <div class="card-body p-4 p-sm-5">
        <form method="post">
          <div class="mb-4">
            <label class="form-label fw-bold text-muted small text-uppercase">اسم المستخدم</label>
            <div class="input-group">
              <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-primary"></i></span>
              <input type="text" name="username" class="form-control border-start-0 ps-0" required autofocus placeholder="admin">
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-bold text-muted small text-uppercase">كلمة المرور</label>
            <div class="input-group">
              <span class="input-group-text bg-light border-end-0"><i class="bi bi-key text-primary"></i></span>
              <input type="password" name="password" class="form-control border-start-0 ps-0" required placeholder="••••••••">
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100 py-2 fw-bold fs-5 shadow-sm mt-2">دخول النظام <i class="bi bi-box-arrow-in-left ms-2"></i></button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
